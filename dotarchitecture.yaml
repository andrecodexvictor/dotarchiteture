recommendedArchitecture: modular-monolith
rejectedArchitectures:
  - architecture: monolith
    reason: Um monólito seria um gargalo para a velocidade de entrega do time,
      deploy desacoplado ou escalabilidade horizontal.
  - architecture: microservices
    reason: Rejeitado devido ao alto custo operacional. Recomendado apenas para
      times grandes (>= 15 membros) com alta complexidade.
  - architecture: event-driven
    reason: Sistemas orientados a eventos trazem complexidade de tracing e
      consistência eventual que não são justificadas neste escopo.
  - architecture: serverless
    reason: Estruturas serverless criam alto acoplamento com provedores de nuvem e
      gargalos de cold start que não alinham com o perfil.
recommendedInternalPattern: hexagonal
recommendedDevStyle:
  - BDD (Behavior-Driven Development) ou alta cobertura de testes
    unitários/integração
  - Trunk-Based Development com branchs de features curtas (< 1 dia)
  - Pipelines de Integração Contínua com gates de validação nos Pull Requests
observabilityDeployGuidelines:
  - Application Performance Monitoring (APM) para acompanhar gargalos de rota e
    consumo de CPU
  - Rotação e agregação local de logs
  - Deploy Rolling Update simples ou Blue-Green básico
warnings: []
patterns:
  - name: Dependency Injection (DI)
    type: Creational / Architectural Pattern
    url: https://refactoring.guru/design-patterns/dependency-injection
    referenceRepos:
      - name: NestJS Dependency Injection
        url: https://github.com/nestjs/nest
      - name: Domain Driven Hexagon (NestJS)
        url: https://github.com/Sairyss/domain-driven-hexagon
  - name: Repository Pattern
    type: Structural Pattern / Data access abstraction
    url: https://refactoring.guru/design-patterns/repository
    referenceRepos:
      - name: TypeScript Clean Architecture Template
        url: https://github.com/khalilstemmler/solid-book
customRationale: "Com base no contexto do projeto, avaliamos um time de **5
  desenvolvedor(es)** com maturidade **intermediate**, lidando com um domínio de
  complexidade **medium**. Com um time médio de 5 devs, sugerimos a abordagem
  **modular-monolith** para facilitar a cooperação em paralelo sem a
  complexidade de rede e orquestração de múltiplos microsserviços. O domínio de
  complexidade média sugere o padrão **hexagonal**, oferecendo um bom equilíbrio
  entre separação de responsabilidades e agilidade de desenvolvimento. "
recommendedFolderScaffold:
  - path: src/domain/models
    purpose: "Entidades ricas de domínio contendo a lógica central de negócio (ex:
      user.entity.ts)."
  - path: src/domain/services
    purpose: Serviços de domínio que lidam com regras envolvendo múltiplos modelos.
  - path: src/application/use-cases
    purpose: Casos de uso da aplicação (interatores, commands/queries) orquestrando
      fluxos.
  - path: src/application/ports
    purpose: Interfaces TypeScript definindo contratos para banco de dados e APIs
      externas.
  - path: src/adapters/primary
    purpose: Controladores HTTP NestJS, resolvers GraphQL ou assinantes de eventos.
  - path: src/adapters/secondary
    purpose: Implementações de repositório (TypeORM, Prisma), clients HTTP ou
      integrações físicas.
tailoredDesignPatterns: []
